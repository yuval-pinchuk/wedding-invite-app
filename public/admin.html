<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #14b8a6;
      --accent-dim: #0d9488;
      --danger: #f43f5e;
      --ok: #22c55e;
      --radius: 12px;
      --font: 'Heebo', 'DM Sans', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .layout { max-width: 920px; margin: 0 auto; padding: 32px 20px 48px; }
    header { margin-bottom: 32px; }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--surface2);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--surface2);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    select:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .row .grow { flex: 1; min-width: 200px; }
    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #042f2e; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--surface2);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--bg);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--surface2);
    }
    .stat b { display: block; font-size: 1.5rem; color: var(--accent); }
    .stat span { font-size: 0.75rem; color: var(--muted); }
    .guest-list {
      max-height: 380px;
      overflow-y: auto;
      border: 1px solid var(--surface2);
      border-radius: 8px;
      padding: 8px;
    }
    .guest-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: var(--bg);
    }
    .guest-item.unselected { opacity: 0.55; }
    .guest-item input { width: 20px; height: 20px; accent-color: var(--accent); }
    .guest-meta { flex: 1; min-width: 0; }
    .guest-name { font-weight: 600; font-size: 0.95rem; }
    .guest-phone { font-size: 0.85rem; color: var(--muted); }
    .guest-addons { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .toolbar button { padding: 8px 14px; font-size: 0.85rem; }
    .banner {
      display: none;
      padding: 14px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 0.9rem;
    }
    .banner.show { display: block; }
    .banner.info { background: rgba(20, 184, 166, 0.12); color: #5eead4; }
    .banner.success { background: rgba(34, 197, 94, 0.12); color: #86efac; }
    .banner.error { background: rgba(244, 63, 94, 0.12); color: #fda4af; }
    .hidden { display: none !important; }
    .qr-wrap {
      text-align: center;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      margin-top: 12px;
      border: 1px solid var(--surface2);
    }
    #qrCanvasHost { margin: 12px auto; min-height: 120px; }
    .qr-hint { font-size: 0.85rem; color: var(--muted); margin-top: 8px; }
    .qr-status-line { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
    .wa-connected-notice {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ok);
      margin: 0 0 12px;
      padding: 6px 12px;
      display: inline-block;
      border-radius: 8px;
      background: rgba(34, 197, 94, 0.14);
    }
    .send-progress {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 12px 20px;
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.9rem;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      z-index: 100;
      max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>Wedding Invitation Manager</h1>
      <p>Google Sheet guests and WhatsApp (Baileys / personal account — unofficial).</p>
    </header>

    <div class="card" id="stepSender">
      <h2>1. Sender</h2>
      <div class="row">
        <div class="grow">

          <select id="senderSelect"><option value="">Loading…</option></select>
        </div>
        <button type="button" class="btn-primary" id="loadGuestsBtn" disabled>Load guests</button>
      </div>
    </div>

    <div class="card hidden" id="stepQr">
      <h2>2. WhatsApp session</h2>
      <div id="waPairingUi">
        <p id="qrStatus" class="qr-status-line">Waiting…</p>
        <div class="qr-wrap">
          <div id="qrCanvasHost"></div>
        </div>
      </div>
      <div id="waConnectedUi" class="hidden">
        <p class="wa-connected-notice">WhatsApp connected</p>
      </div>
      <button type="button" class="btn-ghost" id="clearSessionBtn" style="margin-top:4px;">Clear session &amp; new QR</button>
    </div>

    <div class="card hidden" id="stepGuests">
      <h2>3. Guests</h2>
      <div class="stats">
        <div class="stat"><b id="totalGuests">0</b><span>Total</span></div>
        <div class="stat"><b id="selectedGuests">0</b><span>Selected</span></div>
      </div>
      <div class="toolbar">
        <button type="button" class="btn-ghost" id="selectAllBtn">Select all</button>
        <button type="button" class="btn-ghost" id="deselectAllBtn">Deselect all</button>
      </div>
      <div class="guest-list" id="guestList"></div>
      <button type="button" class="btn-primary" id="sendBtn" style="width:100%;margin-top:16px;" disabled>Send invitations</button>
      <p id="sendProgress" class="send-progress hidden" aria-live="polite"></p>
      <div class="banner" id="sendBanner" role="status"></div>
    </div>
  </div>
  <div id="toast"></div>

  <script>
    let currentSender = '';
    let guests = [];
    let pollingInterval = null;
    let wa = { ready: false, qr: null };
    /** Avoid re-encoding the same Baileys payload on every poll (flicker + scan glitches). */
    let lastRenderedQr = '';
    /** Payload currently being encoded (blocks duplicate starts for the same string). */
    let pendingEncodeQr = '';
    /** Bumps when a new render starts or canvas resets; stale toDataURL callbacks are ignored. */
    let qrRenderToken = 0;

    function resetQrCanvas() {
      qrRenderToken += 1;
      lastRenderedQr = '';
      pendingEncodeQr = '';
      const host = document.getElementById('qrCanvasHost');
      if (host) host.innerHTML = '';
    }

    function setWaConnectedUi(connected) {
      const pairing = document.getElementById('waPairingUi');
      const connectedBox = document.getElementById('waConnectedUi');
      if (pairing) pairing.classList.toggle('hidden', !!connected);
      if (connectedBox) connectedBox.classList.toggle('hidden', !connected);
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadSenders();
      document.getElementById('loadGuestsBtn').addEventListener('click', loadGuests);
      document.getElementById('senderSelect').addEventListener('change', onSenderChange);
      document.getElementById('selectAllBtn').addEventListener('click', selectAll);
      document.getElementById('deselectAllBtn').addEventListener('click', deselectAll);
      document.getElementById('sendBtn').addEventListener('click', confirmAndSend);
      document.getElementById('clearSessionBtn').addEventListener('click', clearSession);
    });

    window.addEventListener('beforeunload', () => stopPolling());

    function onSenderChange() {
      const v = document.getElementById('senderSelect').value;
      document.getElementById('loadGuestsBtn').disabled = !v;
      document.getElementById('stepGuests').classList.add('hidden');
      document.getElementById('stepQr').classList.add('hidden');
      document.getElementById('sendBanner').classList.remove('show', 'info', 'success', 'error');
      stopPolling();
      resetQrCanvas();
      wa = { ready: false, qr: null };
      setWaConnectedUi(false);
      currentSender = v || '';
      guests = [];
    }

    async function loadSenders() {
      try {
        const res = await fetch('/api/admin/senders');
        const data = await res.json();
        const sel = document.getElementById('senderSelect');
        if (!data.success) {
          toast(data.error || 'Failed to load senders', true);
          sel.innerHTML = '<option value="">Error</option>';
          return;
        }
        sel.innerHTML = '<option value="">Choose sender…</option>';
        data.senders.forEach((s) => {
          const o = document.createElement('option');
          o.value = s;
          o.textContent = s;
          sel.appendChild(o);
        });
      } catch (e) {
        toast(e.message, true);
      }
    }

    async function loadGuests() {
      const sender = document.getElementById('senderSelect').value;
      if (!sender) {
        toast('Select a sender first', true);
        return;
      }
      currentSender = sender;
      toast('Loading guests…');
      try {
        const res = await fetch('/api/admin/guests/' + encodeURIComponent(sender));
        const data = await res.json();
        if (!data.success) {
          toast(data.error || 'Failed', true);
          return;
        }
        guests = data.guests;
        document.getElementById('stepGuests').classList.remove('hidden');
        document.getElementById('stepQr').classList.remove('hidden');
        displayGuests();
        updateStats();
        document.getElementById('qrStatus').textContent = 'Starting WhatsApp…';
        void initWaBackground();
        toast('Guests loaded');
      } catch (e) {
        toast(e.message, true);
      }
    }

    async function initWaBackground() {
      try {
        const res = await fetch('/api/admin/init-whatsapp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender: currentSender }),
        });
        const data = await res.json();
        if (!data.success) {
          setWaConnectedUi(false);
          document.getElementById('qrStatus').textContent = data.error || 'Init failed';
          return;
        }
        if (data.ready) {
          wa.ready = true;
          setWaConnectedUi(true);
          return;
        }
        setWaConnectedUi(false);
        if (data.qrCode) {
          wa.qr = data.qrCode;
          displayQR(data.qrCode, data.qrDataUrl);
          document.getElementById('qrStatus').textContent = 'Scan QR with WhatsApp (Linked devices).';
        }
        pollStatus();
      } catch (e) {
        document.getElementById('qrStatus').textContent = e.message;
      }
    }

    function pollStatus() {
      stopPolling();
      pollingInterval = setInterval(async () => {
        try {
          const res = await fetch('/api/admin/whatsapp-status/' + encodeURIComponent(currentSender));
          const data = await res.json();
          if (data.ready) {
            wa.ready = true;
            stopPolling();
            setWaConnectedUi(true);
            resetQrCanvas();
            return;
          }
          if (data.qr) {
            setWaConnectedUi(false);
            wa.qr = data.qr;
            const changed = displayQR(data.qr, data.qrDataUrl);
            if (changed) {
              document.getElementById('qrStatus').textContent = 'Scan QR with WhatsApp (Linked devices).';
            }
          }
        } catch {
          /* ignore */
        }
      }, 2000);
    }

    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    /**
     * Shows server-generated PNG (node-qrcode); pairing string is only used for dedupe / staleness.
     * @returns {boolean} true if a new image load was started.
     */
    function displayQR(qrString, qrDataUrl) {
      const host = document.getElementById('qrCanvasHost');
      if (!qrString || typeof qrString !== 'string') {
        return false;
      }
      if (qrString === lastRenderedQr) {
        return false;
      }
      if (qrString === pendingEncodeQr) {
        return false;
      }
      if (!qrDataUrl || typeof qrDataUrl !== 'string' || !qrDataUrl.startsWith('data:image')) {
        host.textContent = 'QR image unavailable — check server logs and reload.';
        return true;
      }
      pendingEncodeQr = qrString;
      const token = ++qrRenderToken;
      const img = new Image();
      img.alt = 'WhatsApp pairing QR';
      img.decoding = 'async';
      img.onload = function () {
        if (token !== qrRenderToken) {
          return;
        }
        pendingEncodeQr = '';
        lastRenderedQr = qrString;
        host.innerHTML = '';
        img.width = 420;
        img.height = 420;
        img.style.display = 'block';
        img.style.margin = '0 auto';
        img.style.maxWidth = 'min(100%, 420px)';
        img.style.height = 'auto';
        img.style.imageRendering = 'pixelated';
        host.appendChild(img);
      };
      img.onerror = function () {
        if (token !== qrRenderToken) {
          return;
        }
        pendingEncodeQr = '';
        host.textContent = 'Could not load QR image.';
      };
      img.src = qrDataUrl;
      return true;
    }

    async function clearSession() {
      if (!currentSender) return;
      if (!confirm('Clear WhatsApp session for this sender? You will need to scan QR again.')) return;
      stopPolling();
      try {
        const res = await fetch('/api/admin/clear-session/' + encodeURIComponent(currentSender), { method: 'DELETE' });
        const data = await res.json();
        toast(data.message || 'Cleared');
        wa = { ready: false, qr: null };
        setWaConnectedUi(false);
        resetQrCanvas();
        document.getElementById('qrStatus').textContent = 'Session cleared. Reconnecting…';
        await initWaBackground();
      } catch (e) {
        toast(e.message, true);
      }
    }

    function displayGuests() {
      const list = document.getElementById('guestList');
      list.innerHTML = '';
      if (!guests.length) {
        list.innerHTML = '<p style="padding:20px;color:var(--muted);text-align:center;">No guests.</p>';
        return;
      }
      guests.forEach((guest, index) => {
        const isSelected = guest.sendConfirmation === 'v' || guest.sendConfirmation === 'V';
        const div = document.createElement('div');
        div.className = 'guest-item' + (isSelected ? '' : ' unselected');
        div.innerHTML =
          '<input type="checkbox" id="g-' + index + '" ' + (isSelected ? 'checked' : '') + ' />' +
          '<div class="guest-meta">' +
          '<div class="guest-name">' + escapeHtml(guest.fullName || guest.name || '') + '</div>' +
          '<div class="guest-phone">' + escapeHtml(guest.phoneTo || '') + '</div>' +
          (guest.addons ? '<div class="guest-addons">+ ' + escapeHtml(guest.addons) + '</div>' : '') +
          '</div>';
        div.querySelector('input').addEventListener('change', (ev) => toggleGuest(index, ev.target.checked));
        list.appendChild(div);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function toggleGuest(index, isSelected) {
      const guest = guests[index];
      try {
        await updateSendStatus(guest.phoneTo, isSelected);
        guests[index].sendConfirmation = isSelected ? 'v' : '';
        document.getElementById('g-' + index).closest('.guest-item').classList.toggle('unselected', !isSelected);
        updateStats();
      } catch (e) {
        document.getElementById('g-' + index).checked = !isSelected;
        toast(e.message, true);
      }
    }

    async function updateSendStatus(phone, shouldSend) {
      const res = await fetch('/api/admin/update-send-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, shouldSend }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Update failed');
    }

    async function selectAll() {
      for (let i = 0; i < guests.length; i++) {
        if (guests[i].sendConfirmation !== 'v' && guests[i].sendConfirmation !== 'V') {
          const cb = document.getElementById('g-' + i);
          if (cb) {
            cb.checked = true;
            await toggleGuest(i, true);
          }
        }
      }
    }

    async function deselectAll() {
      for (let i = 0; i < guests.length; i++) {
        if (guests[i].sendConfirmation === 'v' || guests[i].sendConfirmation === 'V') {
          const cb = document.getElementById('g-' + i);
          if (cb) {
            cb.checked = false;
            await toggleGuest(i, false);
          }
        }
      }
    }

    function updateStats() {
      const n = guests.filter((g) => g.sendConfirmation === 'v' || g.sendConfirmation === 'V').length;
      document.getElementById('totalGuests').textContent = guests.length;
      document.getElementById('selectedGuests').textContent = n;
      document.getElementById('sendBtn').disabled = n === 0;
    }

    function formatSendProgressLine(ev) {
      let s = ev.successful + ' / ' + ev.total + ' invitations delivered';
      if (ev.failed > 0) {
        s += ' (' + ev.failed + ' failed)';
      }
      if (ev.completed < ev.total) {
        s += '…';
      }
      return s;
    }

    async function readSendInvitationsNdjson(res) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let lastDone = null;

      function handleEvent(ev) {
        if (ev.type === 'progress') {
          const prog = document.getElementById('sendProgress');
          prog.classList.remove('hidden');
          prog.textContent = formatSendProgressLine(ev);
        } else if (ev.type === 'done') {
          lastDone = ev;
        } else if (ev.type === 'error') {
          throw new Error(ev.error || 'Send failed');
        }
      }

      while (true) {
        const { done, value } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
        let nl;
        while ((nl = buffer.indexOf('\n')) >= 0) {
          const line = buffer.slice(0, nl).trim();
          buffer = buffer.slice(nl + 1);
          if (!line) continue;
          handleEvent(JSON.parse(line));
        }
        if (done) {
          if (buffer.trim()) {
            handleEvent(JSON.parse(buffer.trim()));
          }
          break;
        }
      }

      if (!lastDone || !lastDone.success) {
        throw new Error((lastDone && lastDone.error) || 'Incomplete send response');
      }
      return lastDone;
    }

    async function confirmAndSend() {
      const selected = guests.filter((g) => g.sendConfirmation === 'v' || g.sendConfirmation === 'V');
      if (!selected.length) {
        toast('No guests selected', true);
        return;
      }
      if (!confirm('Send ' + selected.length + ' WhatsApp invitation(s)?')) return;

      document.getElementById('sendBtn').disabled = true;
      const banner = document.getElementById('sendBanner');
      const sendProgress = document.getElementById('sendProgress');
      sendProgress.classList.add('hidden');
      sendProgress.textContent = '';
      banner.className = 'banner show info';
      banner.textContent = 'Checking WhatsApp…';

      try {
        const st = await fetch('/api/admin/whatsapp-status/' + encodeURIComponent(currentSender)).then((r) => r.json());
        if (!st.ready) {
          banner.className = 'banner show error';
          banner.textContent = 'WhatsApp not connected. Scan QR in step 2.';
          document.getElementById('sendBtn').disabled = false;
          return;
        }
        banner.className = 'banner show info';
        banner.textContent = 'Sending invitations…';
        sendProgress.classList.remove('hidden');
        sendProgress.textContent = '0 / ' + selected.length + ' invitations delivered…';

        const res = await fetch('/api/admin/send-invitations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Accept: 'application/x-ndjson',
          },
          body: JSON.stringify({
            sender: currentSender,
            guests: selected.map((g) => ({ name: g.name, phone: g.phoneTo, addons: g.addons })),
          }),
        });

        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          throw new Error(errJson.error || res.statusText || 'Send failed');
        }

        const data = await readSendInvitationsNdjson(res);
        sendProgress.classList.add('hidden');
        banner.className = 'banner show success';
        banner.textContent =
          'Done: ' + data.successful + ' delivered' + (data.failed ? ', ' + data.failed + ' failed.' : '.');
        toast('Finished');
      } catch (e) {
        sendProgress.classList.add('hidden');
        banner.className = 'banner show error';
        banner.textContent = e.message;
        toast(e.message, true);
      } finally {
        updateStats();
      }
    }

    let toastTimer;
    function toast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isError ? 'var(--danger)' : 'var(--surface2)';
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
